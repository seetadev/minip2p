[package]
name = "minip2p-relay"
version = "0.1.0"
edition = "2024"
readme = "README.md"

[features]
default = ["std"]
std = [
    "minip2p-core/std",
    "thiserror/std",
]

[dependencies]
minip2p-core = { path = "../core", default-features = false }
thiserror = { version = "2", default-features = false }
